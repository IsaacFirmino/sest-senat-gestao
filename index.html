<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEST SENAT - Gestão</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .iframe-container { height: calc(100vh - 80px); }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body class="bg-gray-900 min-h-screen overflow-hidden">
    <nav class="bg-white px-6 py-3 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="bg-green-700 text-white p-1.5 rounded-lg">
                <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
            </div>
            <h1 class="text-lg font-black text-gray-800 italic">SEST SENAT <span class="text-green-600">Gestão</span></h1>
        </div>
        
        <div class="flex gap-2 bg-gray-100 p-1 rounded-xl">
            <button onclick="switchTab('painel')" id="btn-painel" class="tab-btn px-6 py-2 rounded-lg font-bold bg-white shadow text-blue-700">
                <i data-lucide="tv" class="w-4 h-4 inline mr-2"></i>PAINEL TV
            </button>
            <button onclick="switchTab('gestao')" id="btn-gestao" class="tab-btn px-6 py-2 rounded-lg font-bold text-gray-500">
                <i data-lucide="settings" class="w-4 h-4 inline mr-2"></i>CONTROLE ADM
            </button>
        </div>
    </nav>
    <main>
        <div id="view-painel" class="iframe-container">
            <iframe src="Painel digital.html"></iframe>
        </div>
        <div id="view-gestao" class="iframe-container hidden">
            <iframe src="Controle Administrativo.html"></iframe>
        </div>
    </main>
    <script>
        lucide.createIcons();
        function switchTab(tab) {
            document.querySelectorAll('.iframe-container').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(el => {
                el.classList.remove('bg-white', 'shadow', 'text-blue-700', 'text-green-700');
                el.classList.add('text-gray-500');
            });
            document.getElementById('view-' + tab).classList.remove('hidden');
            const btn = document.getElementById('btn-' + tab);
            btn.classList.add('bg-white', 'shadow');
            btn.classList.add(tab === 'painel' ? 'text-blue-700' : 'text-green-700');
            btn.classList.remove('text-gray-500');
        }
    </script>
</body>
</html>
