<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel Digital</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white min-h-screen flex flex-col overflow-hidden">

<!-- HEADER -->
<div class="flex justify-between items-center px-12 py-8 border-b border-gray-800 bg-gray-900">
    <h1 class="text-4xl font-black">SEST SENAT - Atendimento</h1>
    <div id="clock" class="text-5xl font-mono text-gray-400">00:00:00</div>
</div>

<!-- SENHA PRINCIPAL -->
<div class="flex-grow flex flex-col items-center justify-center p-10">
    <h2 class="text-4xl font-bold text-gray-500 mb-8 uppercase">Senha Atual</h2>
    <div class="bg-gray-900 border-4 border-blue-900 rounded-[4rem] px-32 py-20 text-center">
        <div id="mainSenha" class="text-[10rem] font-black text-yellow-400">---</div>
        <div id="mainNome" class="text-4xl font-bold text-white mt-4">AGUARDANDO</div>
        <div id="mainSala" class="inline-block bg-orange-600 text-4xl font-black px-16 py-4 rounded-full mt-6">SALA</div>
    </div>
</div>

<!-- HISTÓRICO -->
<div class="bg-gray-900 border-t border-gray-800 p-6">
    <div class="text-center mb-6">
        <span class="text-gray-500 font-black uppercase tracking-[0.4em] text-sm">Últimas Senhas</span>
    </div>
    <div id="historyBar" class="flex items-center justify-center gap-6 px-4 overflow-hidden"></div>
</div>

<script>
let lastTimestamp = localStorage.getItem("sest_timestamp");
let ultimaSenhaProcessada = "";

// FUNÇÃO PARA PEGAR PARÂMETROS DA URL
function getUrlParams() {
    const params = new URLSearchParams(window.location.search);
    return {
        senha: params.get('senha'),
        nome: params.get('nome'),
        sala: params.get('sala'),
        timestamp: params.get('timestamp')
    };
}

// ATUALIZAR PAINEL
function atualizarPainel() {
    const senha = localStorage.getItem("sest_ultima_senha");
    const sala = localStorage.getItem("sest_ultima_sala");
    const historico = JSON.parse(localStorage.getItem("sest_historico") || "[]");
    
    if (!senha || historico.length === 0) return;
    
    const atual = historico[0];
    
    document.getElementById('mainSenha').innerText = senha;
    document.getElementById('mainNome').innerText = atual.nome || "CLIENTE";
    document.getElementById('mainSala').innerText = atual.sala || sala || "SALA 1";
    
    // Histórico
    const bar = document.getElementById('historyBar');
    bar.innerHTML = historico.slice(0, 5).map(h => `
        <div class="bg-gray-800 p-5 rounded-3xl min-w-[220px] flex flex-col items-center">
            <div class="text-3xl font-black text-blue-400">${h.senha}</div>
            <div class="text-base font-bold text-white truncate">${h.nome}</div>
            <div class="text-xs text-orange-400">${h.sala}</div>
            <div class="text-xs text-gray-400">${h.hora}</div>
        </div>
    `).join('');
}

// MONITORAR MUDANÇAS
function monitorarMudancas() {
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('pt-BR');
        
        const currentTS = localStorage.getItem("sest_timestamp");
        if (currentTS !== lastTimestamp) {
            lastTimestamp = currentTS;
            atualizarPainel();
            
            // Tenta falar
            try {
                const senha = localStorage.getItem("sest_ultima_senha");
                const historico = JSON.parse(localStorage.getItem("sest_historico") || "[]");
                if (historico[0] && senha !== ultimaSenhaProcessada) {
                    ultimaSenhaProcessada = senha;
                    const msg = new SpeechSynthesisUtterance(`Senha ${senha}. ${historico[0].nome}. ${historico[0].sala}`);
                    msg.lang = 'pt-BR';
                    window.speechSynthesis.speak(msg);
                }
            } catch(e) {}
        }
    }, 1000);
}

// INICIALIZAÇÃO
window.onload = () => {
    // Verifica se veio com parâmetros da URL (do totem)
    const params = getUrlParams();
    
    if (params.senha) {
        console.log("Recebido do totem:", params);
        
        // Salva no localStorage
        localStorage.setItem("sest_ultima_senha", params.senha);
        localStorage.setItem("sest_ultima_sala", params.sala || "SALA 1");
        localStorage.setItem("sest_timestamp", params.timestamp || Date.now());
        
        // Adiciona ao histórico
        let historico = JSON.parse(localStorage.getItem("sest_historico") || "[]");
        historico.unshift({
            nome: params.nome || "Cliente",
            senha: params.senha,
            sala: params.sala || "SALA 1",
            hora: new Date().toLocaleTimeString('pt-BR', {hour: '2-digit', minute:'2-digit'})
        });
        localStorage.setItem("sest_historico", JSON.stringify(historico.slice(0, 10)));
        
        // Remove parâmetros da URL (para não repetir)
        window.history.replaceState({}, document.title, window.location.pathname);
    }
    
    // Atualiza painel e começa monitorar
    atualizarPainel();
    monitorarMudancas();
};
</script>
</body>
</html>
